<script>

const date = document.getElementById("date");
const site = document.getElementById("site");
const report = document.getElementById("report");

window.onload=function(){

document.getElementById("date").value =
new Date().toISOString().split('T')[0];

addCivil();
addInterior();
loadHistory();

}

/* CIVIL ACTIVITY */
function addCivil(){

let div=document.createElement("div");
div.className="activitybox";

div.innerHTML=`
<label>Activity</label>

<select class="activity">
<option> RCC Work</option> 
<option> Brick Work</option>
<option> Plaster</option>
<option> Waterproofing Work</option>
<option> Tile Flooring</option>
<option> Marble Flooring</option>
<option> Epoxy Grouting</option>
<option> Plumbing</option>
<option> Misc. Work</option>
</select>

<label>Skilled</label>
<input type="number" class="skill" value="0" min="0">

<label>Unskilled</label>
<input type="number" class="unskill" value="0" min="0">

<label>Note:- (Optional)</label>
<input type="text" class="desc" placeholder="Work Location or note for this activity">

<button style="background:red;color:white;" onclick="this.parentElement.remove()">Delete</button>
`;

civilContainer.appendChild(div);

}


/* INTERIOR ACTIVITY */
function addInterior(){

let div=document.createElement("div");
div.className="activitybox";

div.innerHTML=`
<label>Activity</label>

<select class="activity">
<option> Furniture Work</option>
<option> Modular Furniture Work</option>
<option> HVAC Work</option>
<option> Electrical Work</option>
<option> IT Work</option>
<option> Aluminium Work</option>
<option> CCTV Work</option>
<option> Paint Work</option>
<option> Lift Work</option>
<option> Fabrication Work</option>
<option> Cleaning Work</option>
<option> Misc. Work</option>
</select>

<label>Skilled</label>
<input type="number" class="skill" value="0" min="0">

<label>Unskilled</label>
<input type="number" class="unskill" value="0" min="0">

<label>Note:- (Optional)</label>
<input type="text" class="desc" placeholder="Work Location or note for this activity">

<button style="background:red;color:white;" onclick="this.parentElement.remove()">Delete</button>
`;

interiorContainer.appendChild(div);

}


/* GENERATE DPR */
function generate(){

report.style.display="block";

let civilAct=document.querySelectorAll("#civilContainer .activity");
let civilSk=document.querySelectorAll("#civilContainer .skill");
let civilUn=document.querySelectorAll("#civilContainer .unskill");
let civilDesc=document.querySelectorAll("#civilContainer .desc");

let intAct=document.querySelectorAll("#interiorContainer .activity");
let intSk=document.querySelectorAll("#interiorContainer .skill");
let intUn=document.querySelectorAll("#interiorContainer .unskill");
let intDesc=document.querySelectorAll("#interiorContainer .desc");

let civil="";
let interior="";
let total=0;

/* CIVIL */
for(let i=0;i<civilAct.length;i++){

let skilled=Math.max(0,Number(civilSk[i].value));
let unskilled=Math.max(0,Number(civilUn[i].value));
let desc=civilDesc[i].value;

civil+=
"<div><u>"+civilAct[i].value+"</u><br>"+
"Skilled : "+skilled+" | Unskilled : "+unskilled+
(desc ? "<br><i>"+desc+"</i>" : "")+
"</div>";

total+=skilled+unskilled;
}

/* INTERIOR */
for(let i=0;i<intAct.length;i++){

let skilled=Math.max(0,Number(intSk[i].value));
let unskilled=Math.max(0,Number(intUn[i].value));
let desc=intDesc[i].value;

interior+=
"<div><u>"+intAct[i].value+"</u><br>"+
"Skilled : "+skilled+" | Unskilled : "+unskilled+
(desc ? "<br><i>"+desc+"</i>" : "")+
"</div>";

total+=skilled+unskilled;
}

rdate.innerHTML="Date : "+date.value+"<br><b>📍Site : "+site.value+"</b><br><br>";
rcivil.innerHTML="🏗️ <b>Civil Work</b><br>"+civil+"<br>🏢 <b>Interior Work</b><br>"+interior;
rmanpower.innerHTML="<div style='margin-top:12px;padding:10px;background:#e8f5e9;border-radius:8px;font-weight:bold;'>Total Manpower : "+total+"</div>";

sendToSheet(date.value,site.value,report.innerText,total);
saveHistory();
loadHistory();

}


/* COPY WHATSAPP */
function copyWhats(){

let text=report.innerText.replace(/\n\n/g,"\n");
navigator.clipboard.writeText(text);
alert("Copied for WhatsApp");

}


/* SAVE HISTORY */
function saveHistory(){

let data={
date:date.value,
site:site.value,
report:report.innerHTML
};

let history=JSON.parse(localStorage.getItem("dprHistory")||"[]");
history.unshift(data);
localStorage.setItem("dprHistory",JSON.stringify(history));

}


/* LOAD HISTORY */
function loadHistory(){

let history=JSON.parse(localStorage.getItem("dprHistory")||"[]");

let sDate=document.getElementById("searchDate").value;
let sSite=document.getElementById("searchSite").value.toLowerCase();

let html="";

history.forEach((item,index)=>{

if(
(sDate && item.date!==sDate) ||
(sSite && !item.site.toLowerCase().includes(sSite))
){
return;
}

html+=`
<div style="border:1px solid #ddd;padding:10px;border-radius:6px;margin-bottom:8px;">
<b>${item.date}</b> - ${item.site}<br><br>
<button onclick="openDPR(${index})">Open</button>
<button style="background:red;color:white;" onclick="deleteDPR(${index})">Delete</button>
</div>
`;

});

historyList.innerHTML = html || "<p style='color:#888;'>No DPR Found</p>";

}


/* OPEN DPR */
function openDPR(index){

let history=JSON.parse(localStorage.getItem("dprHistory")||"[]");
report.style.display="block";
report.innerHTML=history[index].report;

}


/* DELETE DPR */
function deleteDPR(index){

let history=JSON.parse(localStorage.getItem("dprHistory")||"[]");

if(confirm("Delete this DPR?")){
history.splice(index,1);
localStorage.setItem("dprHistory",JSON.stringify(history));
loadHistory();
}

}


/* GOOGLE SHEET */
function sendToSheet(date,site,report,total){

fetch("https://script.google.com/macros/s/AKfycbxbFqkXgtAiQpCRJVH4gT6-L72vXqpvI0UqUYmbJJ_e7vQyXJ0gXBLENYht6_Ak2QYaDw/exec",{
method:"POST",
body:JSON.stringify({date,site,report,total})
})
.then(res=>res.text())
.then(()=>console.log("Saved"))
.catch(err=>console.error(err));

}

</script>
